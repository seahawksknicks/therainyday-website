<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libations — Curated Drinks</title>

  <!-- Open Graph tags for iMessage / social previews -->
  <meta property="og:title" content="Libations — Curated Drinks" />
  <meta property="og:description" content="Track, scan & discover drinks with AI-powered recommendations." />
  <meta property="og:image" content="https://www.therainyday.co/libations-icon.png" />
  <meta property="og:image:width" content="1024" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.therainyday.co/libations" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Libations — Curated Drinks" />
  <meta name="twitter:description" content="Track, scan & discover drinks with AI-powered recommendations." />
  <meta name="twitter:image" content="https://www.therainyday.co/libations-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161e28;
      --border: rgba(255,255,255,0.07);
      --amber: #c8913a;
      --text: #e8e0d4;
      --muted: #8a8078;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 26px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 2rem;
      color: var(--text);
    }

    .tagline {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      width: 100%;
    }

    .store-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--amber);
      color: #0d1117;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      padding: 14px 28px;
      border-radius: 12px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .store-button:hover {
      opacity: 0.9;
    }

    .store-button svg {
      width: 20px;
      height: 20px;
    }

    .store-button.android {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      font-size: 0.9rem;
      padding: 12px 24px;
    }

    .store-button.android:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    .coming-soon {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: -8px;
    }

    .footer {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .footer a {
      color: var(--amber);
      text-decoration: none;
    }
  </style>

  <script>
    // Auto-redirect mobile users to the appropriate store
    (function() {
      var APP_STORE_URL = 'https://apps.apple.com/us/app/libations-personal-bartender/id6760019038';
      // var PLAY_STORE_URL = ''; // Uncomment and set when Android is live
      var ua = navigator.userAgent || '';
      if (/iPhone|iPad|iPod/.test(ua)) {
        window.location.href = APP_STORE_URL;
      }
      // Uncomment when Android is live on Google Play:
      // if (/Android/.test(ua) && PLAY_STORE_URL) {
      //   window.location.href = PLAY_STORE_URL;
      // }
    })();
  </script>
</head>
<body>
  <div class="container">
    <img src="/libations-icon.png" alt="Libations App Icon" class="icon" />
    <h1>Libations</h1>
    <p class="tagline">Every sip, curated — track, scan &amp; discover drinks with AI-powered recommendations.</p>
    <div class="store-buttons">
      <a href="https://apps.apple.com/us/app/libations-personal-bartender/id6760019038" class="store-button">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Download on the App Store
      </a>
      <!-- Uncomment when Android is live on Google Play:
      <a href="PLAY_STORE_URL_HERE" class="store-button android">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.18 23.04L14.46 12 3.18.96C2.81 1.09 2.5 1.47 2.5 2.02v19.96c0 .55.31.93.68 1.06zm1.72.46l12.6-7.26-2.76-2.76L4.9 23.5zm14.54-8.38L6.92 7.38l2.76 2.76 12.52-7.24c-.24-.14-.54-.18-.84-.02L7.68 12l11.76 6.78c.3.16.6.12.84-.02l-1.84-1.64zm-14.54-.64L17.5 7.22l-2.76-2.76L4.9.5C4.66.36 4.38.32 4.12.48L14.46 12 4.9 23.5z"/></svg>
        Get it on Google Play
      </a>
      -->
      <p class="coming-soon">Android coming soon</p>
    </div>
    <p class="footer">By <a href="https://www.therainyday.co">The Rainy Day Company</a></p>
  </div>
</body>
</html>
