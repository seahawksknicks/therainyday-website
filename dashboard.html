<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — The Rainy Day Company</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117; --bg2: #111820; --surface: #161e28; --surface2: #1c2533;
      --border: rgba(255,255,255,0.07); --amber: #c8913a; --amber-dim: #9a6d29;
      --amber-glow: rgba(200,145,58,0.12); --gold: #e8c470; --text: #e8e0d4;
      --muted: #8a8078; --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
      --blue: #60a5fa; --green-dim: rgba(74,222,128,0.15); --red-dim: rgba(248,113,113,0.15);
      --yellow-dim: rgba(251,191,36,0.15); --blue-dim: rgba(96,165,250,0.15);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif;
      font-weight: 300; line-height: 1.65; min-height: 100vh; -webkit-font-smoothing: antialiased;
    }

    /* ── Lock screen ─────────────────────────── */
    .lock-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    .lock-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--amber), var(--amber-dim));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 24px;
    }
    .lock-title {
      font-family: 'Cormorant Garamond', serif; font-weight: 400;
      font-size: 24px; color: var(--text); margin-bottom: 6px;
    }
    .lock-sub {
      font-size: 14px; color: var(--muted); margin-bottom: 28px;
    }
    .lock-form {
      display: flex; gap: 10px; width: 100%; max-width: 340px;
    }
    .lock-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; font-size: 15px;
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s;
    }
    .lock-input:focus { border-color: var(--amber); }
    .lock-input::placeholder { color: var(--muted); }
    .lock-btn {
      background: linear-gradient(135deg, var(--amber), var(--amber-dim));
      border: none; border-radius: 10px; padding: 12px 20px;
      color: var(--bg); font-weight: 500; font-size: 14px; cursor: pointer;
      font-family: 'DM Sans', sans-serif; white-space: nowrap;
      transition: opacity 0.2s;
    }
    .lock-btn:active { opacity: 0.8; }
    .lock-error {
      color: var(--red); font-size: 13px; margin-top: 12px;
      min-height: 20px;
    }

    /* ── Dashboard content (injected after decrypt) ── */
    #dashboard { display: none; }
  </style>
</head>
<body>

  <!-- Lock screen -->
  <div id="lock" class="lock-screen">
    <div class="lock-logo">&#9730;</div>
    <div class="lock-title">Executive Dashboard</div>
    <div class="lock-sub">The Rainy Day Company</div>
    <form class="lock-form" onsubmit="return unlock(event)">
      <input type="password" class="lock-input" id="pw" placeholder="Password" autocomplete="current-password" autofocus />
      <button type="submit" class="lock-btn">Open</button>
    </form>
    <div class="lock-error" id="err"></div>
  </div>

    function b64decode(s) {
      const bin = atob(s);
      const buf = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
      return buf;
    }

    async function decrypt(password) {
      const salt = b64decode(PAYLOAD.salt);
      const iv = b64decode(PAYLOAD.iv);
      const data = b64decode(PAYLOAD.data);

      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
      );
      const key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['decrypt']
      );
      const decrypted = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: iv }, key, data
      );
      return new TextDecoder().decode(decrypted);
    }

    async function unlock(e) {
      e.preventDefault();
      const pw = document.getElementById('pw').value;
      const err = document.getElementById('err');
      if (!pw) { err.textContent = 'Enter password'; return false; }
      try {
        const html = await decrypt(pw);
        document.getElementById('lock').style.display = 'none';
        const dash = document.getElementById('dashboard');
        dash.innerHTML = html;
        dash.style.display = 'block';
        // Remember for this session
        try { sessionStorage.setItem('_dk', pw); } catch(e) {}
      } catch (ex) {
        err.textContent = 'Wrong password';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
      return false;
    }

    // Auto-unlock if password in sessionStorage (same tab, same session)
    (async function() {
      try {
        const saved = sessionStorage.getItem('_dk');
        if (saved) {
          const html = await decrypt(saved);
          document.getElementById('lock').style.display = 'none';
          const dash = document.getElementById('dashboard');
          dash.innerHTML = html;
          dash.style.display = 'block';
        }
      } catch(e) { sessionStorage.removeItem('_dk'); }
    })();
  </script>
</body>
</html>
