<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Logo Options — The Rainy Day Company</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;1,400&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #f5f2ed; padding: 3rem 2rem; }
    h1 { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-bottom: 3rem; }
    .grid { display: flex; flex-direction: column; gap: 0; }
    .option { display: flex; align-items: stretch; border-bottom: 1px solid #e0dbd4; }
    .option:last-child { border-bottom: none; }
    .num { width: 48px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
           font-size: 10px; letter-spacing: 0.15em; color: #bbb; padding: 2rem 0; }
    .light { background: #ffffff; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2.5rem 3rem; }
    .dark  { background: #1a1612; flex: 1; display: flex; align-items: center; justify-content: center; padding: 2.5rem 3rem; }
    .divider { width: 1px; background: #e0dbd4; }
  </style>
</head>
<body>
<h1>Logo Options — Light &amp; Dark</h1>
<div class="grid">

  <!-- ── OPTION 1: Current (raindrop + italic serif) ── -->
  <div class="option">
    <div class="num">1</div>
    <div class="light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 56" width="230" height="56">
        <path d="M20,6 C29,17 33,23 33,32 A13,13 0 0,1 7,32 C7,23 11,17 20,6 Z" fill="#c8913a"/>
        <path d="M16,12 C18,17 19,20 19,24 A3.5,3.5 0 0,1 12,24 C12,20 14,16 16,12 Z" fill="rgba(255,255,255,0.25)"/>
        <line x1="48" y1="12" x2="48" y2="44" stroke="#c8913a" stroke-width="0.75" opacity="0.5"/>
        <text x="61" y="36" font-family="Georgia,serif" font-size="24" fill="#1c1207" font-style="italic">The Rainy Day</text>
        <text x="63" y="48" font-family="Arial,sans-serif" font-size="7" fill="#6b5a3e" letter-spacing="3.5">COMPANY</text>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 56" width="230" height="56">
        <path d="M20,6 C29,17 33,23 33,32 A13,13 0 0,1 7,32 C7,23 11,17 20,6 Z" fill="#e8c470"/>
        <path d="M16,12 C18,17 19,20 19,24 A3.5,3.5 0 0,1 12,24 C12,20 14,16 16,12 Z" fill="rgba(255,255,255,0.15)"/>
        <line x1="48" y1="12" x2="48" y2="44" stroke="#e8c470" stroke-width="0.75" opacity="0.4"/>
        <text x="61" y="36" font-family="Georgia,serif" font-size="24" fill="#e8c470" font-style="italic">The Rainy Day</text>
        <text x="63" y="48" font-family="Arial,sans-serif" font-size="7" fill="#a08860" letter-spacing="3.5">COMPANY</text>
      </svg>
    </div>
  </div>

  <!-- ── OPTION 2: Stacked, centered, raindrop above text ── -->
  <div class="option">
    <div class="num">2</div>
    <div class="light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 80" width="180" height="80">
        <!-- Raindrop centered -->
        <path d="M90,4 C99,16 104,22 104,32 A14,14 0 0,1 76,32 C76,22 81,16 90,4 Z" fill="#c8913a"/>
        <path d="M86,10 C88,16 89,20 89,25 A4,4 0 0,1 81,25 C81,20 83,15 86,10 Z" fill="rgba(255,255,255,0.22)"/>
        <!-- Horizontal rule -->
        <line x1="55" y1="52" x2="125" y2="52" stroke="#c8913a" stroke-width="0.6" opacity="0.45"/>
        <!-- THE RAINY DAY stacked -->
        <text x="90" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#1c1207" font-style="italic">The Rainy Day</text>
        <text x="90" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#6b5a3e" letter-spacing="4">COMPANY</text>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 80" width="180" height="80">
        <path d="M90,4 C99,16 104,22 104,32 A14,14 0 0,1 76,32 C76,22 81,16 90,4 Z" fill="#e8c470"/>
        <path d="M86,10 C88,16 89,20 89,25 A4,4 0 0,1 81,25 C81,20 83,15 86,10 Z" fill="rgba(255,255,255,0.15)"/>
        <line x1="55" y1="52" x2="125" y2="52" stroke="#e8c470" stroke-width="0.6" opacity="0.35"/>
        <text x="90" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="20" fill="#e8c470" font-style="italic">The Rainy Day</text>
        <text x="90" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="6.5" fill="#a08860" letter-spacing="4">COMPANY</text>
      </svg>
    </div>
  </div>

  <!-- ── OPTION 3: All text, no icon, bold first letter treatment ── -->
  <div class="option">
    <div class="num">3</div>
    <div class="light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" width="260" height="48">
        <!-- Decorative rain dots -->
        <circle cx="8"  cy="12" r="1.8" fill="#c8913a" opacity="0.8"/>
        <circle cx="14" cy="22" r="1.2" fill="#c8913a" opacity="0.5"/>
        <circle cx="5"  cy="28" r="1.0" fill="#c8913a" opacity="0.4"/>
        <circle cx="18" cy="10" r="0.9" fill="#c8913a" opacity="0.3"/>
        <circle cx="10" cy="36" r="1.4" fill="#c8913a" opacity="0.6"/>
        <!-- Text -->
        <text x="30" y="32" font-family="Georgia,serif" font-size="26" fill="#1c1207" font-style="italic" font-weight="400">The Rainy Day</text>
        <text x="31" y="44" font-family="Arial,sans-serif" font-size="6.5" fill="#c8913a" letter-spacing="5.5" font-weight="400">COMPANY</text>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 48" width="260" height="48">
        <circle cx="8"  cy="12" r="1.8" fill="#e8c470" opacity="0.8"/>
        <circle cx="14" cy="22" r="1.2" fill="#e8c470" opacity="0.5"/>
        <circle cx="5"  cy="28" r="1.0" fill="#e8c470" opacity="0.4"/>
        <circle cx="18" cy="10" r="0.9" fill="#e8c470" opacity="0.3"/>
        <circle cx="10" cy="36" r="1.4" fill="#e8c470" opacity="0.6"/>
        <text x="30" y="32" font-family="Georgia,serif" font-size="26" fill="#e8c470" font-style="italic" font-weight="400">The Rainy Day</text>
        <text x="31" y="44" font-family="Arial,sans-serif" font-size="6.5" fill="#a08860" letter-spacing="5.5" font-weight="400">COMPANY</text>
      </svg>
    </div>
  </div>

  <!-- ── OPTION 4: Monogram mark + text ── -->
  <div class="option">
    <div class="num">4</div>
    <div class="light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56">
        <!-- Circle mark with RD monogram -->
        <circle cx="26" cy="28" r="20" fill="none" stroke="#c8913a" stroke-width="1.2"/>
        <text x="26" y="33" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#c8913a" font-style="italic">rd</text>
        <!-- Vertical rule -->
        <line x1="55" y1="12" x2="55" y2="44" stroke="#c8913a" stroke-width="0.75" opacity="0.4"/>
        <!-- Text -->
        <text x="68" y="26" font-family="Georgia,serif" font-size="15" fill="#1c1207" font-style="italic">The Rainy Day</text>
        <text x="68" y="42" font-family="Arial,sans-serif" font-size="6.5" fill="#6b5a3e" letter-spacing="3.5">COMPANY</text>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" width="240" height="56">
        <circle cx="26" cy="28" r="20" fill="none" stroke="#e8c470" stroke-width="1.2"/>
        <text x="26" y="33" text-anchor="middle" font-family="Georgia,serif" font-size="16" fill="#e8c470" font-style="italic">rd</text>
        <line x1="55" y1="12" x2="55" y2="44" stroke="#e8c470" stroke-width="0.75" opacity="0.35"/>
        <text x="68" y="26" font-family="Georgia,serif" font-size="15" fill="#e8c470" font-style="italic">The Rainy Day</text>
        <text x="68" y="42" font-family="Arial,sans-serif" font-size="6.5" fill="#a08860" letter-spacing="3.5">COMPANY</text>
      </svg>
    </div>
  </div>

  <!-- ── OPTION 5: Umbrella icon + clean sans-serif ── -->
  <div class="option">
    <div class="num">5</div>
    <div class="light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 56" width="250" height="56">
        <!-- Umbrella icon -->
        <path d="M20,28 A14,14 0 0,1 48,28 Z" fill="#c8913a"/>
        <path d="M34,28 L34,42 Q34,46 38,46 Q42,46 42,42" fill="none" stroke="#c8913a" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="29" stroke="#c8913a" stroke-width="1.5"/>
        <line x1="34" y1="14" x2="34" y2="28" stroke="#c8913a" stroke-width="1.5"/>
        <!-- Vertical rule -->
        <line x1="62" y1="12" x2="62" y2="44" stroke="#c8913a" stroke-width="0.75" opacity="0.4"/>
        <!-- Text — clean, upright -->
        <text x="75" y="30" font-family="Georgia,serif" font-size="20" fill="#1c1207" font-style="italic">The Rainy Day</text>
        <text x="76" y="43" font-family="Arial,sans-serif" font-size="6.5" fill="#6b5a3e" letter-spacing="4">COMPANY</text>
      </svg>
    </div>
    <div class="divider"></div>
    <div class="dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 56" width="250" height="56">
        <path d="M20,28 A14,14 0 0,1 48,28 Z" fill="#e8c470"/>
        <path d="M34,28 L34,42 Q34,46 38,46 Q42,46 42,42" fill="none" stroke="#e8c470" stroke-width="2" stroke-linecap="round"/>
        <line x1="20" y1="28" x2="20" y2="29" stroke="#e8c470" stroke-width="1.5"/>
        <line x1="34" y1="14" x2="34" y2="28" stroke="#e8c470" stroke-width="1.5"/>
        <line x1="62" y1="12" x2="62" y2="44" stroke="#e8c470" stroke-width="0.75" opacity="0.35"/>
        <text x="75" y="30" font-family="Georgia,serif" font-size="20" fill="#e8c470" font-style="italic">The Rainy Day</text>
        <text x="76" y="43" font-family="Arial,sans-serif" font-size="6.5" fill="#a08860" letter-spacing="4">COMPANY</text>
      </svg>
    </div>
  </div>

</div>
</body>
</html>
